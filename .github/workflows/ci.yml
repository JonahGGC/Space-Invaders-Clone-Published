name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Build Docker image ──────────────────────────────────────────────
      - name: Build Docker image
        run: docker build -t spaceinvaders:${{ github.sha }} .

      # ── 3. Smoke-test: start container, hit the server, then stop ──────────
      - name: Smoke test
        run: |
          docker run -d --name ci_test -p 8000:8000 spaceinvaders:${{ github.sha }}
          # Give uvicorn a moment to start
          sleep 5
          # Expect a 200 from the root endpoint
          curl --fail http://localhost:8000 || (docker logs ci_test && exit 1)
          docker stop ci_test && docker rm ci_test

      # ── 4. (Optional) Push to Docker Hub ──────────────────────────────────
